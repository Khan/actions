name: Gerald
description: Auto assign reviewers
inputs:
  token:
    description: secrets.GITHUB_TOKEN
    required: true
  admin-token:
    description: A token that has admin permissions for this repo
    required: true
runs:
  using: "composite"
  steps:
      - name: Get All Changed Files
        uses: ./actions/get-changed-files
        id: changed
        if: ${{ github.event.pull_request.draft == false }}
      - name: Check out base branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: '${{ github.base_ref }}'
        if: ${{ github.event.pull_request.draft == false }}
      - name: Check out head branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: '${{ github.head_ref }}'
        if: ${{ github.event.pull_request.draft == false }}
      - name: Run Gerald
        uses: Khan/gerald@24a71c0501324a2453fbc489b7ebabea217e31f7 # v4.3
        env:
          GITHUB_TOKEN: '${{ inputs.token }}'
          ADMIN_PERMISSION_TOKEN: '${{ inputs.admin-token }}'
          EVENT: 'pull_request'
          ALL_CHANGED_FILES: '${{ steps.changed.outputs.files }}'
        if: ${{ github.event.pull_request.draft == false }}
