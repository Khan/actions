name: "Secure Network"
description: >-
  Set up a DNS firewall that restricts outbound DNS to an explicit allowlist.
  Core GitHub domains are always included. Pass additional .conf files and/or
  extra domains for any other hosts your workflow needs to reach.

inputs:
    conf-files:
        description: >-
            Newline- or space-separated paths to .conf domain allowlist files
            (relative to workspace root or absolute). Blank lines are silently
            ignored, which enables inline conditional expressions, e.g.:
              conf-files: |
                ${{ inputs.foo == 'true' && 'path/to/foo.conf' || '' }}
        required: false
        default: ""
    extra-domains:
        description: "Space-separated list of additional domains to allow."
        required: false
        default: ""

runs:
    using: "composite"
    steps:
        - name: Secure network
          shell: bash
          env:
              CONF_FILES: ${{ inputs.conf-files }}
              EXTRA_DOMAINS: ${{ inputs.extra-domains }}
          run: |
              # Note: secure-network.js is invoked with node directly rather than via
              # actions/github-script or a TypeScript entrypoint because it is a
              # large, security-critical script with its own bundled dependencies
              # (github.conf, github-meta.json). The actions/github-script approach
              # is designed for small inline scripts, not multi-file bundles like this.
              sudo env "PATH=$PATH" node "${{ github.action_path }}/secure-network.js" \
                --conf-files="$CONF_FILES" \
                --extra-domains="$EXTRA_DOMAINS"
