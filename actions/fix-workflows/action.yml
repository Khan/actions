name: Fix Workflows
description: >-
    Validates and auto-fixes GitHub Actions workflow YAML files
    (checkout-followed-by-setup and optionally runs-on patterns), then
    formats them with oxfmt. A `# fix-workflows-ignore` comment on a
    `runs-on:` line or a checkout step opts that job/step out of the fix.
inputs:
    fix-runs-on:
        description: >-
            Whether to fix runs-on values to use the conditional
            ephemeral-runner expression. Off by default.
        required: false
        default: "false"
    setup-action:
        description: >-
            The action that must immediately follow every checkout step.
            Can be a remote action name (e.g. Khan/actions@secure-network-v1)
            or a local path (e.g. ./.github/actions/setup). When a local path
            is given, that action's own file is excluded from validation.
        required: false
        default: Khan/actions@secure-network-v1
runs:
    using: "composite"
    steps:
        - name: Fix workflow violations
          uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
          with:
              script: |
                  try {
                      require('./actions/fix-workflows/index.js').default({
                          core,
                          fixRunsOn: ${{ inputs.fix-runs-on == 'true' }},
                          setupAction: `${{ inputs.setup-action }}`,
                      }).catch(err => core.setFailed(err.message))
                  } catch (err) {
                      core.setFailed(err.message)
                  }

        - name: Format YAML files with oxfmt
          shell: bash
          run: |
              npx --yes oxfmt@0.44.0 --write \
                --config "${{ github.action_path }}/.oxfmtrc.json" \
                ".github/workflows/**/*.yml"

        - name: Show fix instructions
          shell: bash
          run: |
              if git diff --quiet .github/workflows/; then
                echo "No workflow changes needed."
              else
                MAJOR_VERSION=$(node -p "require('${{ github.action_path }}/package.json').version.split('.')[0]")
                TAG="fix-workflows-v${MAJOR_VERSION}"
                ARGS="${{ inputs.fix-runs-on == 'true' && ' --fix-runs-on' || '' }} --setup-action '${{ inputs.setup-action }}'"
                CMD="pnpm dlx github:Khan/actions#${TAG}${ARGS}"
                HINT="Or add a '# fix-workflows-ignore' comment to the runs-on line or checkout step to opt out."
                for file in $(git diff --name-only .github/workflows/); do
                  echo "::warning file=${file}::This file needs updating. Run: ${CMD} ${HINT}"
                done
              fi
