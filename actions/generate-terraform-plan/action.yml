# This workflow generates a Terraform plan and handles PR creation/comments.
# It can be called from any repository. It handles:
# - Checking for plan files
# - Authenticating with GCP
# - Generating a Terraform plan
# - Uploading the binary plan to GCS (binary plans embed a full copy of the
#   Terraform state, including sensitive values, so they are never committed)
# - Handling PR creation/comments (the PR contains only the redacted plan
#   text and a pointer file recording which uploaded plan to apply)
# - Commenting on PRs for success/failure
# All environment variables starting with TF_VAR_ will be automatically picked up by Terraform
# Example: TF_VAR_project_id, TF_VAR_region, etc.

name: "Generate Terraform Plan"
description: "Generates a Terraform plan and handles PR creation/comments"

inputs:
  terraform_path:
    description: "Path to the Terraform directory"
    required: true
  plan_file_binary:
    description: "Filename for the binary plan file"
    required: false
    default: "tfplan.binary"
  plan_file_text:
    description: "Filename for the text plan file"
    required: false
    default: "tfplan.txt"
  plan_file_pointer:
    description: "Filename for the committed pointer file that records the commit SHA whose uploaded binary plan should be applied and that plan's sha256 digest"
    required: false
    default: "tfplan.commit"
  plan_bucket:
    description: "GCS bucket, optionally with a path prefix (e.g. 'my-bucket/terraform-plans'), where the binary plan is uploaded. Required when enable_pr_creation is 'true'. Must match the apply-terraform-plan action's plan_bucket input. The service account needs permission to create objects in this bucket. A binary plan contains the same sensitive data as the Terraform state, so restrict this bucket exactly like the state bucket: CI service accounts only, no human-facing grants."
    required: false
    default: ""
  workload_identity_provider:
    description: "Workload Identity Provider for Google Cloud authentication"
    required: true
  service_account:
    description: "Service account email for Google Cloud authentication"
    required: true
  terraform_version:
    description: "Terraform version to use"
    required: false
    default: "1.9.2"
  github_token:
    description: "GitHub token for API operations"
    required: true
  pr_creation_branch:
    description: "The base branch against which to open the plan PR"
    required: false
    default: "master"
  enable_pr_comment:
    description: "Whether to comment on an existing PR with the plan"
    required: false
    default: 'true'
  comment_extra_text:
    description: "Additional Markdown text to append to the Terraform plan PR comment"
    required: false
    default: ""
  enable_pr_creation:
    description: "Whether to create a new PR with the plan on pushes to the base branch"
    required: false
    default: 'true'
  apply_workflow_filename:
    description: "The filename of the apply workflow, used to find the last successful deployment commit"
    required: true
  pr_title:
    description: "The title for the pull request created with the plan"
    required: false
    default: "Terraform Plan Update"
  pr_extra_text:
    description: "Additional Markdown text to append to the generated plan pull request body"
    required: false
    default: ""
  fallback_reviewers:
    description: "Username(s) to assign as reviewer when github.actor is not appropriate (e.g., for scheduled jobs or bot-triggered runs). Supports comma-separated list: 'user1,user2,user3'"
    required: false
    default: ""

outputs:
  has_changes:
    description: "A flag indicating if the plan contains changes"
    value: ${{ steps.plan.outputs.has_changes }}

runs:
  using: "composite"
  steps:

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Authenticate with Google Cloud
      uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}

    - name: Terraform Init, Validate and Fmt Check
      shell: bash
      working-directory: ${{ inputs.terraform_path }}
      run: |
        terraform init -input=false
        terraform validate
        terraform fmt -check

    - name: Generate Terraform Plan
      id: plan
      shell: bash
      working-directory: ${{ inputs.terraform_path }}
      run: |
        # Handle backward compatibility with tf_vars_json
        if [[ -n "$TF_VARS_JSON" && "$TF_VARS_JSON" != "{}" ]]; then
          echo "Warning: tf_vars_json is deprecated. Use TF_VAR_* environment variables instead."
          # Convert JSON to TF_VAR_ environment variables for backward compatibility
          echo "$TF_VARS_JSON" | jq -r 'to_entries | .[] | "export TF_VAR_\(.key)=\(.value)"' | while read -r line; do
            if [[ -n "$line" ]]; then
              eval "$line"
            fi
          done
        fi

        # Terraform locks state during `plan` by default for safety. In our workflow,
        # only the plan produced on the configured base/apply branch (`pr_creation_branch`,
        # usually `main`/`master`) is intended for a subsequent `apply`, and applies always
        # run with a lock.
        # To avoid lock contention from PR branch plans blocking applies on the base branch,
        # we disable locking for non-base branches. The lock is shared across branches, so
        # leaving it on everywhere causes frequent contention and failed applies or plans
        # that require manual re-runs.
        if [[ "${{ github.ref_name }}" == "${{ inputs.pr_creation_branch }}" ]]; then
          terraform plan -out=${{ inputs.plan_file_binary }}
        else
          terraform plan -lock=false -out=${{ inputs.plan_file_binary }}
        fi
        terraform show -no-color ${{ inputs.plan_file_binary }} > ${{ inputs.plan_file_text }}
        if grep -q "No changes" "${{ inputs.plan_file_text }}"; then
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        fi

    # A binary plan file embeds a full copy of the Terraform state, including
    # sensitive values in cleartext, regardless of what the plan changes.
    # Committing it would put that state into git history permanently, so we
    # upload it to an access-controlled GCS bucket instead and commit only a
    # small pointer file recording the commit SHA the plan was generated from.
    # The apply-terraform-plan action rebuilds the object path from its own
    # plan_bucket input plus that SHA and downloads the exact plan that was
    # reviewed. Plans that are never applied (e.g. superseded plan PRs) leave
    # objects behind; configure a lifecycle rule on the bucket to expire them.
    #
    # The gcloud CLI is preinstalled on GitHub-hosted runners and picks up the
    # credentials exported by the auth step above.
    - name: Upload binary plan to GCS
      if: inputs.enable_pr_creation == 'true' && github.ref_name == inputs.pr_creation_branch && steps.plan.outputs.has_changes == 'true'
      id: upload
      shell: bash
      working-directory: ${{ inputs.terraform_path }}
      run: |
        if [ -z "${{ inputs.plan_bucket }}" ]; then
          echo "The plan_bucket input is required when enable_pr_creation is 'true': the binary plan is uploaded to GCS instead of being committed." >&2
          exit 1
        fi
        # Slug the terraform path the same way apply-terraform-plan does, so
        # concurrent stacks in one repo can't collide on an object path;
        # utils/terraform-plan-object-key.test.ts pins the two copies to each
        # other. The short hash suffix keeps two terraform paths that
        # normalize to the same slug from colliding.
        slug=$(printf '%s' "${{ inputs.terraform_path }}" | tr -c 'A-Za-z0-9._-' '-' | sed -E 's/-+/-/g; s/^-//; s/-$//')
        slug="${slug}-$(printf '%s' "${{ inputs.terraform_path }}" | sha256sum | cut -c1-8)"
        # The object's filename segment is a fixed literal on both sides so
        # the key can't depend on the two actions' independently configurable
        # local filename inputs.
        object="gs://${{ inputs.plan_bucket }}/${slug}/${{ github.sha }}/tfplan.binary"
        plan_hash=$(sha256sum "${{ inputs.plan_file_binary }}" | cut -d' ' -f1)
        gcloud storage cp "${{ inputs.plan_file_binary }}" "$object"
        rm -f "${{ inputs.plan_file_binary }}"
        # The pointer records the commit SHA the plan was generated from and
        # the plan's sha256, which apply-terraform-plan verifies after
        # download so the applied bytes are exactly the reviewed plan. It
        # deliberately holds no gs:// URI: apply reconstructs the object path
        # from its own workflow-configured inputs, so a tampered pointer
        # cannot point apply at an arbitrary object.
        printf '%s\n%s\n' "${{ github.sha }}" "$plan_hash" > "${{ inputs.plan_file_pointer }}"
        echo "object=$object" >> "$GITHUB_OUTPUT"
        echo "Uploaded binary plan to $object (sha256 $plan_hash)"

    - name: Get Last Deployed Commit
      if: steps.plan.outputs.has_changes == 'true' && github.ref_name == inputs.pr_creation_branch && inputs.enable_pr_creation == 'true'
      id: last_deployed
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        LAST_SUCCESSFUL_RUN_SHA=$(gh api "repos/${{ github.repository }}/actions/workflows/${{ inputs.apply_workflow_filename }}/runs" \
          --jq '.workflow_runs[] | select(.conclusion == "success") | {sha: .head_sha, created: .created_at}' \
          --paginate \
          | jq -s 'sort_by(.created) | reverse | .[0].sha' \
          | tr -d '"')
        if [ -n "$LAST_SUCCESSFUL_RUN_SHA" ] && [ "$LAST_SUCCESSFUL_RUN_SHA" != "null" ]; then
          echo "last_deployed=$LAST_SUCCESSFUL_RUN_SHA" >> "$GITHUB_OUTPUT"
        else
          LAST_DEPLOYED=$(git rev-list --max-parents=0 HEAD)
          echo "last_deployed=$LAST_DEPLOYED" >> "$GITHUB_OUTPUT"
        fi

    - name: Close previous PRs created by this workflow
      if: inputs.enable_pr_creation == 'true' && github.ref_name == inputs.pr_creation_branch && steps.plan.outputs.has_changes == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        gh pr list --state open --base ${{ inputs.pr_creation_branch }} --json number,title --jq '.[] | select(.title == "${{ inputs.pr_title }}") | .number' | while read -r pr; do
          if [ -n "$pr" ]; then
            echo "Closing PR #$pr..."
            gh pr comment "$pr" --body "This PR has been superseded by a new plan PR. Closing in favor of the latest."
            gh pr close "$pr"
          fi
        done

    - name: Determine Reviewer
      if: inputs.enable_pr_creation == 'true' && github.ref_name == inputs.pr_creation_branch && steps.plan.outputs.has_changes == 'true'
      id: reviewer
      shell: bash
      run: |
        # Use fallback_reviewers only if github.actor is a bot or the event is scheduled
        if [[ "${{ github.actor }}" == *"[bot]"* ]] || [[ "${{ github.event_name }}" == "schedule" ]]; then
          if [[ -n "${{ inputs.fallback_reviewers }}" ]]; then
            # Clean up comma-separated list by removing spaces
            CLEANED_REVIEWERS=$(echo "${{ inputs.fallback_reviewers }}" | sed 's/ //g')
            echo "reviewer=$CLEANED_REVIEWERS" >> "$GITHUB_OUTPUT"
          else
            echo "reviewer=" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "reviewer=${{ github.actor }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Create PR with Plan
      if: inputs.enable_pr_creation == 'true' && github.ref_name == inputs.pr_creation_branch && steps.plan.outputs.has_changes == 'true'
      uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
      with:
        token: ${{ inputs.github_token }}
        commit-message: 'chore(terraform): update plan'
        branch: 'ci/terraform-plan-${{ github.run_id }}'
        title: ${{ inputs.pr_title }}
        body: |
          This PR was automatically generated by the `${{ github.workflow }}` workflow.

          This PR includes the latest Terraform plan. After this PR is merged, the plan will be applied. Please review the plan and approve this PR. When the changes are ready to deploy, this PR can be squashed and merged.

          Note, this plan reflects the current state of the `${{ inputs.pr_creation_branch }}` branch and may include changes from multiple contributors.

          Plaintext plan file: `${{ inputs.terraform_path }}/${{ inputs.plan_file_text }}`
          Binary plan: `${{ steps.upload.outputs.object }}`

          The binary plan is stored in GCS rather than committed because it embeds a full copy of the Terraform state, including sensitive values. The committed pointer file `${{ inputs.terraform_path }}/${{ inputs.plan_file_pointer }}` records which uploaded plan the apply workflow will download.

          ## Changes Since Last Deployment
          You can view all changes that have not yet been deployed [here](https://github.com/${{ github.repository }}/compare/${{ steps.last_deployed.outputs.last_deployed }}...${{ github.sha }}).

          ${{ github.event_name == 'schedule' && '## Scheduled Build Context
          This PR was triggered by a scheduled build, which typically occurs due to:
          - Daily rebuilds of listener and runner images
          - Upstream dependency changes (e.g., new base images, Debian package updates)
          - New versions of secrets being pushed

          To evaluate this change:
          1. Check the plan output above to see what infrastructure changes are proposed
          2. Review the changes in the diff link above to understand what code or configuration changed
          3. If the diff shows no code changes but a Docker image digest changed in the plan, the rebuild was triggered by an upstream update — typically a new version of the base image being republished, or new versions of OS packages installed via the Dockerfile. The daily scheduled rebuild picks these up automatically so the deployed image stays on patched bases. This is expected and safe to merge.' || '' }}

          ${{ inputs.pr_extra_text }}
        add-paths: |
          ${{ inputs.terraform_path }}/${{ inputs.plan_file_pointer }}
          ${{ inputs.terraform_path }}/${{ inputs.plan_file_text }}
        base: ${{ inputs.pr_creation_branch }}
        reviewers: ${{ steps.reviewer.outputs.reviewer }}

    - name: Comment on PR with Terraform plan
      if: inputs.enable_pr_comment == 'true' && github.event_name == 'pull_request' && steps.plan.outputs.has_changes == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        PLAN_TEXT_PATH="${{ inputs.terraform_path }}/${{ inputs.plan_file_text }}"
        PLAN=$(head -c 65000 "$PLAN_TEXT_PATH")
        PR_COMMENTS=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments")
        COMMENT_ID=$(echo "$PR_COMMENTS" | jq -r '.[] | select(.user.login == "github-actions[bot]") | select(.body | test("<!-- terraform-plan -->")) | .id')
        COMMENT_BODY=$(cat <<EOF
        <!-- terraform-plan -->
        ### Terraform Plan Preview
        This is a preview of the Terraform plan based on the current PR. Note that:
        - The plan may change if other PRs are merged before this one
        - The plan may differ if this PR is not up to date with ${{ inputs.pr_creation_branch }}
        After this PR is merged, the plan will be regenerated to ensure it's up to date with the latest infrastructure state and a new PR will be automatically created with the updated plan.
        \`\`\`terraform
        $PLAN
        \`\`\`
        ${{ inputs.comment_extra_text }}
        EOF
        )
        if [[ -n "$COMMENT_ID" ]]; then
          echo "Updating existing comment $COMMENT_ID"
          gh api --method PATCH "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" -f body="$COMMENT_BODY"
        else
          echo "Creating new comment"
          gh pr comment "$PR_NUMBER" --body "$COMMENT_BODY"
        fi
