name: Node CI Push

on:
    - push

jobs:
    check:
        name: Testing with 'push' events
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
            - uses: ./actions/shared-node-cache
            - run: pnpm run lint
            - run: pnpm run build
            - run: node -r @swc-node/register utils/check-action-dependencies.ts

            - uses: ./actions/get-changed-files
              id: changed-limited
              with:
                  directories: |
                      .github/
                      .changeset

            - uses: ./actions/get-changed-files
              id: changed
