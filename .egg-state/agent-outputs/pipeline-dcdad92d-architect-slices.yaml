  serialized_chain_order:
  - slice-2
  exit_criteria: |-
    Smoke cases load via the shared loader; no-post run produces findings/verdict
    with zero GitHub writes; CI runs the smoke set green on baseline.
  tasks:
  - id: TASK-9-1
