# Review full eval suite, scheduled (R5, task-11-6)
#
# STAGED FILE, NOT YET ACTIVE. It lives under `.github-staging/` because no
# producer role in this pipeline may push to `.github/` directly (gateway phase
# restriction, #2508). A human must move it into place for it to run:
#
#     git mv .github-staging/review-eval-full.yml .github/workflows/review-eval-full.yml
#
# (See the PR body's "Pre-merge obligations" note.) This is the scheduled
# counterpart to review-smoke.yml: the smoke subset gates every PR, while this
# workflow replays the FULL four-dataset corpus (incidents, synthetic-mutations,
# golden, clean, plus the adversarial holdout) off-PR on a weekly schedule.
#
# Two jobs:
#
#   full-suite   The deterministic pipeline (loadCorpus -> runCorpus ->
#                computeMetrics -> evaluateGates) plus the stub-judge
#                composition checks, via the committed vitest suite. Needs no
#                secrets; fails the run if the adversarial hard gate or any
#                case expectation regresses.
#
#   live-judge   The same corpus run scored by the live pinned judge model
#                (judge.ts PINNED_JUDGE_MODEL) through the JudgeModel seam.
#                judge.ts deliberately ships no API client (the seam is pure);
#                this job supplies the one production JudgeModel implementation
#                inline and prints the JudgeReport + thumbs-free gate summary.
#                Skips cleanly when the ANTHROPIC_API_KEY secret is absent.

name: Review Full Eval Suite

on:
  schedule:
    # Weekly, Monday 09:00 UTC. The full suite + live judge is deliberately
    # off-PR (task-11-6): judge calls cost real money and must never gate PRs.
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

jobs:
  full-suite:
    name: Full eval suite (deterministic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./actions/shared-node-cache
      # suite.test.ts drives loadCorpus -> runCorpus -> computeMetrics ->
      # evaluateGates over the full corpus (FULL_CASES/FULL_RUNS) and asserts
      # the adversarial hard gate; this is the complete deterministic suite,
      # not the smoke subset.
      - run: pnpm run test --run workflows/review/eval

  live-judge:
    name: Live judge over the full corpus
    runs-on: ubuntu-latest
    needs: full-suite
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./actions/shared-node-cache
      - name: Run judgeCorpus with the live pinned model
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY secret not configured; skipping the live-judge run." >&2
            exit 0
          fi
          cat > ./eval-full-live-judge.mts <<'SCRIPT'
          import {loadCorpus} from "./workflows/review/eval/corpus/loader";
          import {runCorpus} from "./workflows/review/eval/runner";
          import {computeMetrics} from "./workflows/review/eval/metrics";
          import {evaluateGates} from "./workflows/review/eval/gates";
          import {
              judgeCorpus,
              PINNED_JUDGE_MODEL,
              type JudgeModel,
              type JudgeRequest,
              type JudgeScore,
          } from "./workflows/review/eval/judge";
          import type {EvalRun} from "./workflows/review/eval/run-types";

          const API_URL = "https://api.anthropic.com/v1/messages";
          const CONCURRENCY = 4;

          const scoreOne = async (request: JudgeRequest): Promise<JudgeScore> => {
              const prompt = [
                  "You are grading one code-review comment for quality.",
                  "Return ONLY a JSON object: {\"verdict\": \"good\"|\"borderline\"|\"bad\", \"quality\": <0..1>, \"rationale\": \"<one sentence>\"}.",
                  "",
                  `PR context:\n${request.context}`,
                  "",
                  `Comment (lens=${request.lens}, label=${request.label}):\n${request.commentBody}`,
                  "",
                  `Evidence trace:\n${request.evidenceTrace.join("\n")}`,
              ].join("\n");
              const response = await fetch(API_URL, {
                  method: "POST",
                  headers: {
                      "x-api-key": process.env.ANTHROPIC_API_KEY ?? "",
                      "anthropic-version": "2023-06-01",
                      "content-type": "application/json",
                  },
                  body: JSON.stringify({
                      model: PINNED_JUDGE_MODEL,
                      max_tokens: 512,
                      messages: [{role: "user", content: prompt}],
                  }),
              });
              if (!response.ok) {
                  throw new Error(`judge call failed: ${response.status} ${await response.text()}`);
              }
              const data = (await response.json()) as {content: {type: string; text?: string}[]};
              const text = data.content.find((block) => block.type === "text")?.text ?? "";
              const match = text.match(/\{[\s\S]*\}/);
              if (!match) {
                  throw new Error(`judge returned no JSON for finding ${request.findingId}: ${text}`);
              }
              const parsed = JSON.parse(match[0]) as Omit<JudgeScore, "findingId">;
              return {findingId: request.findingId, ...parsed};
          };

          const liveJudge: JudgeModel = async (requests) => {
              const scores: JudgeScore[] = [];
              for (let i = 0; i < requests.length; i += CONCURRENCY) {
                  const batch = requests.slice(i, i + CONCURRENCY);
                  scores.push(...(await Promise.all(batch.map(scoreOne))));
              }
              return scores;
          };

          const cases = loadCorpus();
          const results = runCorpus(cases);
          const runs: EvalRun[] = cases.map((corpusCase, index) => ({
              corpusCase,
              result: results[index],
          }));

          const metrics = computeMetrics(runs);
          const gates = evaluateGates(runs);
          const judged = await judgeCorpus(runs, liveJudge);

          console.log(JSON.stringify({metrics, gates, judge: judged.report}, null, 2));
          console.log(`audit sample (${judged.auditSample.length} entries):`);
          for (const entry of judged.auditSample) {
              console.log(JSON.stringify(entry));
          }
          if (!gates.automaticModeAllowed) {
              console.error("Adversarial hard gate FAILED on the scheduled full-suite run.");
              process.exit(1);
          }
          SCRIPT
          pnpm dlx tsx ./eval-full-live-judge.mts
